{% extends 'main/base.html' %}
{% load static %}

{% block content %}
<section class="space-arena">
    <div class="container">
        <div class="game-ui glass animate-down">
            <div class="stats">
                <div class="stat"><i data-lucide="shield" class="text-primary"></i> <span id="life">3</span></div>
                <div class="stat"><i data-lucide="zap" class="text-warning"></i> <span id="score">0</span></div>
            </div>
            <div class="target-question">
                <h3 id="question">Loading Question...</h3>
            </div>
            <div class="timer-box">
                <span id="timer">60s</span>
            </div>
        </div>

        <div id="game-container">
            <canvas id="gameCanvas"></canvas>
            
            <div id="start-overlay" class="overlay glass">
                <div class="content animate-scale">
                    <h1>Gravity Drop</h1>
                    <p>Move your basket to catch the CORRECT falling answer!</p>
                    <button id="start-btn" class="btn btn-primary btn-large mt-4">Start Dropping</button>
                </div>
            </div>

            <div id="game-over" class="overlay glass hidden">
                <div class="content animate-scale">
                    <h1 id="over-title">Game Over</h1>
                    <p>Final Score: <span id="final-score">0</span></p>
                    <div id="xp-reward" class="reward-badge">+0 XP</div>
                    <div class="mt-4">
                        <button onclick="location.reload()" class="btn btn-primary">Try Again</button>
                        <a href="{% url 'game_dashboard' %}" class="btn btn-secondary ms-2">Exit</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>

<style>
.space-arena { padding: 7rem 0 2rem; height: 100vh; overflow: hidden; background: #020617; }
.game-ui { 
    display: flex; justify-content: space-between; align-items: center; 
    padding: 1rem 2rem; border-radius: 1.5rem; margin-bottom: 1rem;
    position: relative; z-index: 10;
}
.stats { display: flex; gap: 1.5rem; font-size: 1.25rem; font-weight: 800; }
.stat { display: flex; align-items: center; gap: 0.5rem; }
.target-question h3 { margin: 0; font-size: 1.4rem; color: #fff; text-shadow: 0 0 10px rgba(99,102,241,0.5); }
.timer-box { font-family: monospace; font-size: 1.5rem; font-weight: 700; color: #f87171; }

#game-container {
    position: relative;
    width: 100%;
    height: calc(100vh - 15rem);
    background: #000;
    border-radius: 2rem;
    overflow: hidden;
    border: 2px solid rgba(255,255,255,0.05);
}
canvas { width: 100%; height: 100%; display: block; }

.overlay {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    background: rgba(15, 23, 42, 0.8);
    backdrop-filter: blur(8px);
    z-index: 20;
}
.overlay.hidden { display: none; }
.content { text-align: center; max-width: 400px; padding: 2rem; }
.reward-badge { 
    display: inline-block; padding: 0.5rem 1.5rem; 
    background: rgba(245, 158, 11, 0.2); color: #fbbf24;
    border-radius: 99rem; font-weight: 800; margin-top: 1rem;
}
</style>

{% block extra_js %}
<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const startOverlay = document.getElementById('start-overlay');
const gameOverOverlay = document.getElementById('game-over');
const startBtn = document.getElementById('start-btn');

let width, height;
let player, blocks;
let score = 0, lives = 3, gameActive = false, timeLeft = 60;
let currentQuestion = null;
let baseSpeed = 2;

const questions = [
    { q: "12 + 13 = ?", a: "25", options: ["24", "25", "26", "23"] },
    { q: "Capital of India?", a: "Delhi", options: ["Mumbai", "Delhi", "Kolkata", "Chennai"] },
    { q: "5 x 6 = ?", a: "30", options: ["25", "30", "35", "20"] },
    { q: "What is H2O?", a: "Water", options: ["Air", "Fire", "Water", "Soil"] },
    { q: "Largest Planet?", a: "Jupiter", options: ["Earth", "Mars", "Jupiter", "Saturn"] },
    { q: "Opposite of Cold?", a: "Hot", options: ["Warm", "Cool", "Hot", "Ice"] },
    { q: "20 / 4 = ?", a: "5", options: ["4", "5", "6", "10"] },
    { q: "Color of Sun?", a: "Yellow", options: ["Red", "Blue", "Yellow", "Green"] },
    { q: "Highest Mountain?", a: "Everest", options: ["K2", "Everest", "Fuji", "Alps"] },
    { q: "8 + 7 = ?", a: "15", options: ["14", "15", "16", "13"] },
    { q: "Primary Source of Energy?", a: "Sun", options: ["Moon", "Wind", "Sun", "Water"] }
];

function resize() {
    width = canvas.width = canvas.parentElement.clientWidth;
    height = canvas.height = canvas.parentElement.clientHeight;
    if (player) {
        player.y = height - 30;
    }
}
window.addEventListener('resize', resize);
resize();

class Player {
    constructor() {
        this.width = 100;
        this.height = 20;
        this.x = width / 2 - this.width / 2;
        this.y = height - 30;
    }
    draw() {
        ctx.fillStyle = '#6366f1';
        // Draw basket
        ctx.beginPath();
        ctx.roundRect(this.x, this.y, this.width, this.height, 10);
        ctx.fill();
        // Glow
        ctx.shadowBlur = 15; ctx.shadowColor = '#6366f1';
    }
}

class Block {
    constructor(text, isCorrect, index, total) {
        // Divide width into columns
        const colWidth = width / total;
        this.width = Math.min(120, colWidth - 20);
        this.height = 40;
        this.x = index * colWidth + (colWidth / 2) - (this.width / 2);
        this.y = -50 - (Math.random() * 50); // Start slightly offscreen
        this.text = text;
        this.isCorrect = isCorrect;
        this.speed = baseSpeed + (Math.random() * 1);
        this.active = true;
    }
    update() { 
        this.y += this.speed; 
    }
    draw() {
        if (!this.active) return;
        ctx.shadowBlur = 10; 
        // All blocks look the same to hide the correct answer
        ctx.shadowColor = '#8b5cf6';
        ctx.fillStyle = '#1e293b';
        ctx.beginPath();
        ctx.roundRect(this.x, this.y, this.width, this.height, 8);
        ctx.fill();
        
        ctx.strokeStyle = 'rgba(255,255,255,0.2)'; 
        ctx.lineWidth = 2;
        ctx.stroke();
        
        ctx.fillStyle = '#fff'; 
        ctx.font = 'bold 16px Arial';
        ctx.textAlign = 'center'; 
        ctx.textBaseline = 'middle';
        ctx.fillText(this.text, this.x + this.width / 2, this.y + this.height / 2);
        ctx.shadowBlur = 0;
    }
}

function nextQuestion() {
    currentQuestion = questions[Math.floor(Math.random() * questions.length)];
    document.getElementById('question').textContent = currentQuestion.q;
    
    // Spawn blocks
    blocks = [];
    currentQuestion.options.forEach((opt, index) => {
        blocks.push(new Block(opt, opt === currentQuestion.a, index, currentQuestion.options.length));
    });
    
    // Increase speed slightly
    baseSpeed += 0.1;
}

function initGame() {
    player = new Player();
    blocks = [];
    score = 0; lives = 3; timeLeft = 60; baseSpeed = 2;
    document.getElementById('score').textContent = score;
    document.getElementById('life').textContent = lives;
    gameActive = true;
    nextQuestion();
    animate();
    startTimer();
}

function startTimer() {
    const t = setInterval(() => {
        if (!gameActive) { clearInterval(t); return; }
        timeLeft--;
        document.getElementById('timer').textContent = `${timeLeft}s`;
        if (timeLeft <= 0) gameOver("Time Up!");
    }, 1000);
}

function gameOver(reason) {
    gameActive = false;
    gameOverOverlay.classList.remove('hidden');
    document.getElementById('over-title').textContent = reason;
    document.getElementById('final-score').textContent = score;
    const xp = score * 20;
    document.getElementById('xp-reward').textContent = `+${xp} XP`;
    
    fetch('/api/game/results/', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'X-CSRFToken': '{{ csrf_token }}' },
        body: JSON.stringify({ xp: xp, game: 'gravity_drop' })
    });
}

function animate() {
    if (!gameActive) return;
    ctx.fillStyle = 'rgba(0,0,0,0.4)'; // Slight trail effect
    ctx.fillRect(0,0,width,height);
    
    player.draw();
    
    let allBlocksMissed = true;
    
    blocks.forEach((b) => {
        if (!b.active) return;
        b.update(); 
        b.draw();
        
        // Check collision with player
        if (b.y + b.height > player.y && b.y < player.y + player.height) {
            if (b.x + b.width > player.x && b.x < player.x + player.width) {
                // Collision!
                b.active = false;
                if (b.isCorrect) {
                    score++; 
                    document.getElementById('score').textContent = score;
                    // Flash screen green
                    ctx.fillStyle = 'rgba(16, 185, 129, 0.3)';
                    ctx.fillRect(0,0,width,height);
                    nextQuestion();
                } else {
                    lives--; 
                    document.getElementById('life').textContent = lives;
                    // Flash screen red
                    ctx.fillStyle = 'rgba(239, 68, 68, 0.3)';
                    ctx.fillRect(0,0,width,height);
                    if (lives <= 0) gameOver("Out of Lives!");
                }
            }
        }
        
        // If the block is still above the bottom, we haven't missed everything
        if (b.y < height) {
            allBlocksMissed = false;
        } else if (b.active && b.isCorrect) {
            // Correct block hit the ground!
            b.active = false;
            lives--;
            document.getElementById('life').textContent = lives;
            ctx.fillStyle = 'rgba(239, 68, 68, 0.3)';
            ctx.fillRect(0,0,width,height);
            if (lives <= 0) {
                gameOver("Missed the correct answer!");
            } else {
                nextQuestion();
            }
        }
    });
    
    if (allBlocksMissed) {
        // If somehow all blocks fell and we didn't process the correct one hitting the ground
        nextQuestion();
    }
    
    requestAnimationFrame(animate);
}

// Controls
canvas.addEventListener('mousemove', (e) => {
    if (gameActive) {
        const rect = canvas.getBoundingClientRect();
        let targetX = e.clientX - rect.left - player.width / 2;
        // Keep within bounds
        targetX = Math.max(0, Math.min(width - player.width, targetX));
        player.x = targetX;
    }
});

// Touch controls for mobile
canvas.addEventListener('touchmove', (e) => {
    if (gameActive) {
        e.preventDefault();
        const rect = canvas.getBoundingClientRect();
        let targetX = e.touches[0].clientX - rect.left - player.width / 2;
        targetX = Math.max(0, Math.min(width - player.width, targetX));
        player.x = targetX;
    }
}, {passive: false});

startBtn.onclick = () => {
    startOverlay.classList.add('hidden');
    initGame();
};
</script>
{% endblock %}
{% endblock %}
