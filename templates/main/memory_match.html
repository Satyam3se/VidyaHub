{% extends 'main/base.html' %}
{% load static %}

{% block content %}
<section class="memory-arena">
    <div class="container">
        <div class="game-header glass animate-down">
            <div class="game-info">
                <span class="badge badge-primary">Memory Match</span>
                <h2>Focus & Recall</h2>
                <p class="text-muted">Match the educational pairs to earn XP!</p>
            </div>
            <div class="game-stats">
                <div class="stat-item glass">
                    <span class="label">Moves</span>
                    <span id="moves-count">0</span>
                </div>
                <div class="stat-item glass">
                    <span class="label">Matches</span>
                    <span id="matches-count">0/8</span>
                </div>
            </div>
        </div>

        <div class="memory-grid mt-4" id="game-grid">
            <!-- Cards will be generated here -->
        </div>

        <!-- Result Screen (Hidden) -->
        <div id="result-screen" class="result-overlay hidden glass">
            <div class="result-content animate-scale">
                <div class="victory-icon">
                    <span style="font-size: 2.5rem;">🏆</span>
                </div>
                <h1>Brilliant!</h1>
                <p>You matched all pairs in <span id="final-moves">0</span> moves.</p>
                <div class="reward-box glass mt-4">
                    <div class="reward-item">
                        <span style="font-size: 1.25rem;">⚡</span>
                        <span>+30 XP</span>
                    </div>
                </div>
                <div class="mt-4">
                    <a href="{% url 'game_dashboard' %}" class="btn btn-primary glass-glow">Back to Games</a>
                    <button onclick="location.reload()" class="btn btn-secondary glass ms-2">Play Again</button>
                </div>
            </div>
        </div>
    </div>
</section>

<style>
.memory-arena { padding: 8rem 0 4rem; min-height: 100vh; background: radial-gradient(circle at 10% 20%, rgba(99, 102, 241, 0.05) 0%, transparent 50%); }

.game-header { display: flex; justify-content: space-between; align-items: center; padding: 1.5rem 2.5rem; border-radius: 1.5rem; margin-bottom: 2rem; }
.game-stats { display: flex; gap: 1rem; }
.stat-item { padding: 0.5rem 1.25rem; border-radius: 1rem; text-align: center; }
.stat-item .label { display: block; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px; color: var(--text-muted); }
.stat-item span:last-child { font-size: 1.25rem; font-weight: 800; color: var(--primary); }

.memory-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 1.25rem;
    max-width: 800px;
    margin: 0 auto;
    perspective: 1000px;
}

.memory-card {
    height: 140px;
    position: relative;
    cursor: pointer;
    transform-style: preserve-3d;
    transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
}

.memory-card.flipped { transform: rotateY(180deg); }
.memory-card.matched { transform: rotateY(180deg) scale(0.95); opacity: 0.6; pointer-events: none; }

.card-face {
    position: absolute;
    inset: 0;
    backface-visibility: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 1.25rem;
    border: 1px solid var(--glass-border);
}

.card-front {
    background: rgba(255, 255, 255, 0.05);
    backdrop-filter: blur(5px);
    backface-visibility: hidden;
}

.card-emoji { font-size: 2.5rem; }

.card-back .card-emoji { font-size: 3rem; }

.result-overlay { position: fixed; inset: 0; z-index: 1000; background: rgba(15, 23, 42, 0.9); display: flex; align-items: center; justify-content: center; backdrop-filter: blur(10px); }
.result-content { text-align: center; padding: 3rem; }
.victory-icon { width: 80px; height: 80px; background: rgba(251, 191, 36, 0.2); color: #fbbf24; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 1.5rem; }
.victory-icon i { width: 40px; height: 40px; }

@media (max-width: 600px) {
    .memory-grid { grid-template-columns: repeat(4, 1fr); gap: 0.5rem; }
    .memory-card { height: 80px; }
    .game-header { flex-direction: column; gap: 1rem; text-align: center; }
    .card-back i { width: 24px; height: 24px; }
}
</style>

{% block extra_js %}
<script>
    // Always use emojis - no Lucide dependency
    const iconFallbacks = {
        'book-open': '📚',
        'brain-circuit': '🧠',
        'calculator': '🔢',
        'dna': '🧬',
        'atom': '⚛️',
        'globe': '🌍',
        'languages': '🗣️',
        'microscope': '🔬',
        'help-circle': '❓'
    };
    
    const icons = [
        'book-open', 'brain-circuit', 'calculator', 'dna', 
        'atom', 'globe', 'languages', 'microscope'
    ];
    let cards = [...icons, ...icons];
    let flippedCards = [];
    let moves = 0;
    let matches = 0;
    let lockBoard = false;

    function shuffle(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
    }
    
    function createBoard() {
        const grid = document.getElementById('game-grid');
        shuffle(cards);
        
        cards.forEach((icon, index) => {
            const card = document.createElement('div');
            card.className = 'memory-card animate-scale';
            card.dataset.icon = icon;
            card.innerHTML = `
                <div class="card-face card-front glass">
                    <span class="card-emoji">❓</span>
                </div>
                <div class="card-face card-back">
                    <span class="card-emoji">${iconFallbacks[icon]}</span>
                </div>
            `;
            card.onclick = () => flipCard(card);
            grid.appendChild(card);
        });
    }

    function flipCard(card) {
        if (lockBoard || card === flippedCards[0] || card.classList.contains('matched')) return;

        card.classList.add('flipped');
        flippedCards.push(card);

        if (flippedCards.length === 2) {
            moves++;
            document.getElementById('moves-count').textContent = moves;
            checkMatch();
        }
    }

    function checkMatch() {
        const [card1, card2] = flippedCards;
        const isMatch = card1.dataset.icon === card2.dataset.icon;

        if (isMatch) {
            disableCards();
        } else {
            unflipCards();
        }
    }

    function disableCards() {
        flippedCards.forEach(card => card.classList.add('matched'));
        matches++;
        document.getElementById('matches-count').textContent = `${matches}/8`;
        resetBoard();
        
        if (matches === icons.length) {
            setTimeout(victory, 500);
        }
    }

    function unflipCards() {
        lockBoard = true;
        setTimeout(() => {
            flippedCards.forEach(card => card.classList.remove('flipped'));
            resetBoard();
        }, 1000);
    }

    function resetBoard() {
        flippedCards = [];
        lockBoard = false;
    }

    function victory() {
        document.getElementById('final-moves').textContent = moves;
        document.getElementById('result-screen').classList.remove('hidden');
        
        // Award XP via API
        fetch('/api/game/results/', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'X-CSRFToken': '{{ csrf_token }}' },
            body: JSON.stringify({ xp: 30, game: 'memory_match' })
        });
    }

    document.addEventListener('DOMContentLoaded', createBoard);
</script>
{% endblock %}
{% endblock %}
