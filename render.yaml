services:
  - type: web
    name: vidyahub
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt && python manage.py migrate && python manage.py collectstatic --noinput
    startCommand: gunicorn vidyahub.wsgi:application --bind 0.0.0.0:$PORT --worker-class eventlet --timeout 120
    healthCheckPath: /
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.10
      - key: DEBUG
        value: "false"
      - key: SECRET_KEY
        generateValue: true
      - key: AI_SIMULATION_MODE
        value: "False"
