services:
  - type: web
    name: vidyahub
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt && python manage.py migrate --noinput && python manage.py collectstatic --noinput
    startCommand: python run_app.py
    healthCheckPath: /
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.10"
      - key: DEBUG
        value: "True"
      - key: SECRET_KEY
        generateValue: true
      - key: AI_SIMULATION_MODE
        value: "False"
      - key: PRODUCTION
        value: "True"
